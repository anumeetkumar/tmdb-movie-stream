<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nxsha Premium Player</title>
    
    <!-- SEO Optimization -->
    <meta name="description" content="Watch movies and series on Nxsha Premium Player. High-performance direct HLS streams.">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #1b122d 0%, #0d0816 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            width: 95%; max-width: 1100px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px; padding: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 20px;
            animation: fadeIn 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 16px; flex-wrap: wrap; gap: 12px;
        }
        .title-area h1 {
            font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, #a12cfc 0%, #187bf0 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .title-area p { font-size: 14px; color: #bcaed2; margin-top: 4px; }
        .source-select-area { display: flex; align-items: center; gap: 10px; }
        .source-label { font-size: 13px; color: #bcaed2; font-weight: 600; white-space: nowrap; }
        .source-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 8px 16px; border-radius: 12px;
            font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600;
            outline: none; cursor: pointer; max-width: 320px;
            transition: all 0.2s ease;
        }
        .source-select:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        .source-select option { background: #0d0816; color: #fff; }
        .player-wrapper {
            position: relative; width: 100%; aspect-ratio: 16/9;
            background: #000; border-radius: 16px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }
        #player { width: 100%; height: 100%; }
        #loading-overlay {
            position: absolute; inset: 0;
            background: rgba(13,8,22,0.96);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 20; gap: 14px; border-radius: 16px;
            transition: opacity 0.4s ease;
        }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .load-spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #a12cfc;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .load-text { color: #bcaed2; font-size: 14px; font-weight: 600; }
        .load-subtext { color: #64557f; font-size: 12px; }
        .footer {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; color: #8e7fa5; flex-wrap: wrap; gap: 10px;
        }
        .btn {
            background: linear-gradient(135deg, #a12cfc 0%, #187bf0 100%);
            border: none; color: #fff; padding: 10px 20px; border-radius: 12px;
            font-weight: 600; cursor: pointer; text-decoration: none;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(161,44,252,0.3);
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ccc; box-shadow: none;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .controls-info { display: flex; gap: 15px; flex-wrap: wrap; }
        #stream-status { font-size: 12px; color: #a12cfc; }

        /* Embed Mode */
        body.embed-mode {
            background: #000; padding: 0; margin: 0; overflow: hidden; width: 100vw; height: 100vh;
        }
        body.embed-mode .container {
            width: 100vw; height: 100vh; max-width: none; padding: 0; border: none; border-radius: 0; box-shadow: none; display: block; position: relative;
        }
        body.embed-mode .header, body.embed-mode .footer {
            display: none;
        }
        body.embed-mode .player-wrapper {
            width: 100vw; height: 100vh; aspect-ratio: auto; border: none; border-radius: 0;
        }
        body.embed-mode #loading-overlay {
            border-radius: 0;
        }
        body.embed-mode .source-select-area {
            position: absolute; top: 16px; right: 16px; z-index: 100;
            background: rgba(13, 8, 22, 0.85); backdrop-filter: blur(12px);
            padding: 6px 12px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.08);
            opacity: 1; transition: opacity 0.3s ease, transform 0.3s ease; pointer-events: auto;
        }
        body.embed-mode .source-select-area.fade-out {
            opacity: 0; pointer-events: none; transform: translateY(-8px);
        }
        body.embed-mode .source-label { color: #fff; }
        body.embed-mode .source-select {
            background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); font-size: 12px; padding: 6px 12px;
        }

        /* Custom Video.js Styling to match premium violet/dark theme */
        .video-js {
            background-color: #000;
        }
        .video-js .vjs-control-bar {
            background-color: rgba(13, 8, 22, 0.85) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .video-js .vjs-play-progress, .video-js .vjs-volume-level {
            background-color: #a12cfc !important;
        }
        .video-js .vjs-slider {
            background-color: rgba(255, 255, 255, 0.2) !important;
        }
        .video-js .vjs-big-play-button {
            background-color: rgba(161, 44, 252, 0.5) !important;
            border-color: #a12cfc !important;
            border-radius: 50% !important;
            width: 70px !important;
            height: 70px !important;
            line-height: 70px !important;
            margin-left: -35px !important;
            margin-top: -35px !important;
            transition: all 0.3s ease !important;
        }
        .video-js:hover .vjs-big-play-button {
            background-color: #a12cfc !important;
            transform: scale(1.1);
        }
        /* Customize video.js text tracks */
        .video-js .vjs-text-track-display {
          transform: translateY(-5%) !important;
          pointer-events: none !important;
        }
        .video-js .vjs-text-track-cue {
          background-color: transparent !important;
          text-align: center !important;
        }
        .video-js .vjs-text-track-cue > div {
          display: inline-block !important;
          background-color: rgba(0,0,0,0.75) !important;
          color: #FFFFFF !important;
          font-size: 1.25rem !important;
          font-family: sans-serif !important;
          font-weight: 600 !important;
          text-shadow: 2px 2px 4px rgba(0,0,0,0.9), -1px -1px 2px rgba(0,0,0,0.9) !important;
          border-radius: 4px !important;
          padding: 2px 8px !important;
        }

        .media-loader-bar {
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.02); border-radius: 12px;
            padding: 10px 16px; border: 1px solid rgba(255,255,255,0.05);
            margin-top: 10px;
        }
        .loader-input-group {
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .loader-label { font-size: 13px; color: #bcaed2; font-weight: 600; }
        .loader-input {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 6px 12px; border-radius: 8px; outline: none;
            font-family: inherit; font-size: 13px;
        }
        .loader-input:focus { border-color: #a12cfc; }
        .loader-select {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 6px 12px; border-radius: 8px; outline: none;
            font-family: inherit; font-size: 13px; cursor: pointer;
        }
        .loader-select option { background: #0d0816; }
        .btn-load {
            padding: 6px 16px; font-size: 13px; border-radius: 8px;
        }
        
        /* Hide loader bar completely when in Embed mode */
        body.embed-mode .media-loader-bar {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-area">
                <h1 id="media-title">Nxsha Player</h1>
                <p id="media-subtitle">Initializing stream resolver...</p>
            </div>
            <div class="source-select-area" id="select-wrapper">
                <span class="source-label">Server:</span>
                <select id="source-select" class="source-select" disabled>
                    <option>Loading servers...</option>
                </select>
            </div>
        </div>
        <div class="player-wrapper">
            <video id="player" class="video-js vjs-default-skin vjs-big-play-centered vjs-fill" controls playsinline crossorigin="anonymous" style="width: 100%; height: 100%; object-fit: contain; background: #000;"></video>
            <div id="loading-overlay">
                <div class="load-spinner"></div>
                <div class="load-text" id="load-text">Resolving multi-server sources from Nxsha...</div>
                <div class="load-subtext">Initializing connections in background</div>
            </div>
        </div>
        
        <!-- Load Custom TMDB Media Bar -->
        <div class="media-loader-bar">
            <div class="loader-input-group">
                <span class="loader-label">Load Custom ID:</span>
                <input type="text" id="custom-id" placeholder="TMDB ID" class="loader-input" style="width: 110px;">
                <select id="custom-type" class="loader-select">
                    <option value="movie">Movie</option>
                    <option value="tv">TV Show</option>
                </select>
                <input type="number" id="custom-season" placeholder="S" class="loader-input" style="width: 55px; display: none;">
                <input type="number" id="custom-episode" placeholder="E" class="loader-input" style="width: 55px; display: none;">
                <button onclick="navigateMedia()" class="btn btn-load">Load</button>
            </div>
        </div>
        <div class="footer">
            <div class="controls-info">
                <span>Space: Play/Pause</span>
                <span>Double Click: Fullscreen</span>
                <span id="stream-status"></span>
            </div>
            <div style="display:flex;gap:10px;">
                <button class="btn" onclick="location.reload()">Reload</button>
            </div>
        </div>
    </div>
    <script>
        // Parse parameters
        const params = new URLSearchParams(window.location.search);
        const tmdbId = params.get('id') || params.get('tmdbId') || '1280738';
        const rawType = params.get('type') || 'movie';
        const type = rawType === 'series' || rawType === 'tv' ? 'tv' : 'movie';
        const season = params.get('season') || params.get('s') || '';
        const episode = params.get('episode') || params.get('e') || '';
        const isEmbed = params.get('embed') === 'true';

        // Elements
        const mediaTitleEl = document.getElementById('media-title');
        const mediaSubtitleEl = document.getElementById('media-subtitle');
        const overlay = document.getElementById('loading-overlay');
        const loadText = document.getElementById('load-text');
        const select = document.getElementById('source-select');
        const statusEl = document.getElementById('stream-status');
        const wrapper = document.getElementById('select-wrapper');

        let streams = [];
        let errorTimer = null;
        let currentIdx = 0;
        let failedSet = new Set();
        let playerInstance = null;

        if (isEmbed) {
            document.body.classList.add('embed-mode');
            document.querySelector('.player-wrapper').appendChild(wrapper);
            setupEmbedOverlayControls();
        }

        // ─── Embed Mode UI Overlay Auto-Hide Logic ──────────────────────────────
        function setupEmbedOverlayControls() {
            let hideTimer = null;
            function showControls() {
                wrapper.classList.remove('fade-out');
                clearTimeout(hideTimer);
                hideTimer = setTimeout(() => {
                    if (playerInstance && !playerInstance.paused()) {
                        wrapper.classList.add('fade-out');
                    }
                }, 3000);
            }
            document.addEventListener('mousemove', showControls);
            document.addEventListener('touchstart', showControls);
            showControls();
            setInterval(() => {
                if (playerInstance && playerInstance.paused()) {
                    wrapper.classList.remove('fade-out');
                }
            }, 1000);
        }

        function getPlayableUrl(stream) {
            if (!stream || !stream.url) return '';
            const original = stream.url;
            if (original.indexOf('robotz-server.workers.dev') !== -1) {
                return original;
            }
            let host = '';
            try {
                host = new URL(original).hostname.toLowerCase();
            } catch (e) {}
            if (host.includes('111477.xyz') || host.endsWith('fvncw.com') || host.endsWith('bxncw.com')) {
                return original;
            }
            return 'https://xbm.robotz-server.workers.dev/?url=' + encodeURIComponent(original);
        }

        function isHls(url) {
            return url && (url.indexOf('.m3u8') !== -1 || url.indexOf('m3u8-proxy') !== -1);
        }
        function isProxy(url) {
            return url && (url.indexOf('/m3u8-proxy') !== -1 || url.indexOf('/ts-proxy') !== -1);
        }
        function hideOverlay() {
            overlay.classList.add('hidden');
            setTimeout(() => { overlay.style.display = 'none'; }, 400);
        }

        function markFailed(idx) {
            if (failedSet.has(idx)) return;
            failedSet.add(idx);
            const opt = select.options[idx];
            if (opt) {
                opt.textContent = '[✗] ' + opt.textContent.replace('[✗] ', '');
                opt.style.color = '#ff4444';
                opt.disabled = true;
            }
            const alive = streams.length - failedSet.size;
            statusEl.textContent = `${alive}/${streams.length} server(s) alive`;
        }

        async function preflightCheck(url, idx) {
            if (!isProxy(url)) return; 
            try {
                const ctrl = new AbortController();
                const tid = setTimeout(() => ctrl.abort(), 8000);
                const res = await fetch(url, { signal: ctrl.signal });
                clearTimeout(tid);
                if (!res.ok) { markFailed(idx); return; }
                const ct = (res.headers.get('content-type') || '').toLowerCase();
                if (ct.indexOf('application/json') !== -1 || ct.indexOf('text/html') !== -1) {
                    markFailed(idx);
                }
            } catch (e) {
                markFailed(idx);
            }
        }

        let watchdogTimer = null;

        function startWatchdog() {
            clearWatchdog();
            watchdogTimer = setTimeout(() => {
                console.warn('[Watchdog] Stream loading stalled for 6.5 seconds. Auto-failing over...');
                if (playerInstance) {
                    playerInstance.trigger('error');
                }
            }, 6500);
        }

        function clearWatchdog() {
            if (watchdogTimer) {
                clearTimeout(watchdogTimer);
                watchdogTimer = null;
            }
        }

        function initPlayer(stream) {
            if (!stream || !stream.url) return;

            const pUrl = getPlayableUrl(stream);
            const mimeType = isHls(pUrl) ? 'application/x-mpegURL' : 'video/mp4';

            if (playerInstance) {
                // Reset player error states
                playerInstance.error(null);
                startWatchdog();
                playerInstance.src({
                    src: pUrl,
                    type: mimeType
                });
                playerInstance.play().catch(e => {
                    console.warn('[Player] Play blocked:', e);
                });
                return;
            }

            startWatchdog();
            playerInstance = videojs('player', {
                autoplay: true,
                controls: true,
                fluid: false,
                sources: [{
                    src: pUrl,
                    type: mimeType
                }]
            });

            playerInstance.on('playing', () => {
                clearWatchdog();
                console.log('[Watchdog] Video started playing successfully. Watchdog cleared.');
            });

            playerInstance.on('error', () => {
                clearWatchdog();
                if (errorTimer) return;
                markFailed(currentIdx);
                errorTimer = setTimeout(() => {
                    errorTimer = null;
                    let next = currentIdx + 1;
                    while (next < streams.length && failedSet.has(next)) next++;
                    if (next < streams.length) {
                        currentIdx = next;
                        select.value = String(next);
                        playStream(streams[next]);
                    } else {
                        statusEl.textContent = 'All servers exhausted.';
                    }
                }, 1500);
            });
        }

        function playStream(stream) {
            if (!stream || !stream.url) return;
            initPlayer(stream);
        }

        function populateSelect(list) {
            select.innerHTML = '';
            list.forEach((s, i) => {
                const opt = document.createElement('option');
                opt.value = String(i);
                opt.textContent = `[${s.provider || 'Nxsha'}] ${s.title || s.name || 'Stream'} (${s.quality || 'Auto'})`;
                select.appendChild(opt);
            });
            select.disabled = false;
        }

        select.addEventListener('change', (e) => {
            const idx = parseInt(e.target.value, 10);
            if (isNaN(idx) || idx < 0 || idx >= streams.length) return;
            currentIdx = idx;
            playStream(streams[idx]);
        });

        async function loadMetadata() {
            try {
                const res = await fetch(`/api/metadata/${type}/${tmdbId}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.success && data.title) {
                        let title = data.title;
                        if (season && episode) title += ` (S${season}E${episode})`;
                        mediaTitleEl.textContent = title;
                        mediaSubtitleEl.textContent = data.tagline || data.overview || '';
                        document.title = `${title} | Nxsha Premium Player`;
                    }
                }
            } catch (e) {
                // Ignore metadata failures
            }
        }

        async function loadStreams() {
            try {
                let resolveUrl = `/api/resolve-nxsha/${type}/${tmdbId}`;
                const queryParts = [];
                if (season) queryParts.push(`season=${season}`);
                if (episode) queryParts.push(`episode=${episode}`);
                if (queryParts.length) resolveUrl += '?' + queryParts.join('&');

                const res = await fetch(resolveUrl, { cache: 'no-store' });
                if (!res.ok) throw new Error('Resolver API error');
                const data = await res.json();
                const fetched = (data.streams || []).filter(s => s && s.url);

                if (fetched.length === 0) {
                    loadText.textContent = 'No streams found. Retrying in 4s...';
                    setTimeout(loadStreams, 4000);
                    return;
                }

                streams = fetched;
                populateSelect(streams);
                statusEl.textContent = `${streams.length} server(s) available`;
                currentIdx = 0;
                select.value = '0';
                hideOverlay();
                initPlayer(streams[0]);

                // Rely on Backend Preflight checks — no need to check on frontend!
                // streams.forEach((s, i) => {
                //     const pUrl = getPlayableUrl(s);
                //     if (isProxy(pUrl)) preflightCheck(pUrl, i);
                // });
            } catch (e) {
                console.error(e);
                loadText.textContent = 'Error loading streams. Retrying...';
                setTimeout(loadStreams, 4000);
            }
        }

        // Bind UI inputs for Custom TMDB Media Bar
        const customTypeEl = document.getElementById('custom-type');
        const customSeasonEl = document.getElementById('custom-season');
        const customEpisodeEl = document.getElementById('custom-episode');
        
        customTypeEl.addEventListener('change', () => {
            if (customTypeEl.value === 'tv') {
                customSeasonEl.style.display = 'inline-block';
                customEpisodeEl.style.display = 'inline-block';
            } else {
                customSeasonEl.style.display = 'none';
                customEpisodeEl.style.display = 'none';
            }
        });

        function navigateMedia() {
            const id = document.getElementById('custom-id').value.trim();
            const type = customTypeEl.value;
            const seasonVal = customSeasonEl.value.trim();
            const episodeVal = customEpisodeEl.value.trim();
            
            if (!id) {
                alert('Please enter a valid TMDB ID');
                return;
            }
            
            let targetUrl = `${window.location.pathname}?id=${id}&type=${type}`;
            if (type === 'tv') {
                targetUrl += `&season=${seasonVal || 1}&episode=${episodeVal || 1}`;
            }
            if (params.get('embed') === 'true') {
                targetUrl += '&embed=true';
            }
            window.location.href = targetUrl;
        }

        // Pre-fill loader inputs with current query state
        document.getElementById('custom-id').value = tmdbId;
        customTypeEl.value = type;
        if (type === 'tv') {
            customSeasonEl.style.display = 'inline-block';
            customEpisodeEl.style.display = 'inline-block';
            customSeasonEl.value = season || '1';
            customEpisodeEl.value = episode || '1';
        }

        loadMetadata();
        loadStreams();
    </script>
</body>
</html>
